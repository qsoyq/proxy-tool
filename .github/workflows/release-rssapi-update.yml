name: release rssapi update

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-rssapi-update-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'ci/update-rssapi-')
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.release.outputs.created }}
      project_version: ${{ steps.versions.outputs.project_version }}
    timeout-minutes: 10
    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Read release versions
        id: versions
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as pyproject_file:
              pyproject = tomllib.load(pyproject_file)

          project_version = pyproject["project"]["version"]
          rssapi_version = pyproject["tool"]["uv"]["sources"]["rssapi"]["rev"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output_file:
              print(f"project_version={project_version}", file=output_file)
              print(f"rssapi_version={rssapi_version}", file=output_file)
          PY

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.versions.outputs.project_version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.existing.outputs.exists }}" = "true" ]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release create "${{ steps.versions.outputs.project_version }}" \
            --target "${{ github.event.pull_request.merge_commit_sha }}" \
            --title "${{ steps.versions.outputs.project_version }}" \
            --notes "Automated patch release after merging #${{ github.event.pull_request.number }}. Includes rssapi ${{ steps.versions.outputs.rssapi_version }}."
          echo "created=true" >> "$GITHUB_OUTPUT"

  image:
    needs: release
    if: needs.release.outputs.created == 'true'
    uses: ./.github/workflows/release-image.yml
    with:
      tag: ${{ needs.release.outputs.project_version }}
    secrets: inherit
