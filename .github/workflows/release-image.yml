name: build image on release

on:
  release:
    types:
      - published
  workflow_call:
    inputs:
      tag:
        description: Image tag to build and publish
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true
      IMAGE:
        required: true

permissions:
  contents: read

concurrency:
  group: release-image-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }} image
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image tag
        id: image
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push architecture image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ secrets.IMAGE }}:${{ steps.image.outputs.tag }}-${{ matrix.suffix }}
            ${{ secrets.IMAGE }}:latest-${{ matrix.suffix }}
          cache-from: type=gha,scope=release-image-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=release-image-${{ matrix.suffix }}

  manifest:
    name: Create multi-arch manifests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment: production
    steps:
      - name: Resolve image tag
        id: image
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create version manifest
        run: |
          docker buildx imagetools create \
            -t "${{ secrets.IMAGE }}:${{ steps.image.outputs.tag }}" \
            "${{ secrets.IMAGE }}:${{ steps.image.outputs.tag }}-amd64" \
            "${{ secrets.IMAGE }}:${{ steps.image.outputs.tag }}-arm64"

      - name: Create latest manifest
        run: |
          docker buildx imagetools create \
            -t "${{ secrets.IMAGE }}:latest" \
            "${{ secrets.IMAGE }}:latest-amd64" \
            "${{ secrets.IMAGE }}:latest-arm64"
