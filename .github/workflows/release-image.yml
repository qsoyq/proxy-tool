name: build image on release

on:
  release:
    types:
      - published
  workflow_call:
    inputs:
      tag:
        description: Image tag to build and publish
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true
      IMAGE:
        required: true

permissions:
  contents: read

concurrency:
  group: release-image-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image tag
        id: image
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          tags: |
            ${{ secrets.IMAGE }}:${{ steps.image.outputs.tag }}
            ${{ secrets.IMAGE }}:latest
